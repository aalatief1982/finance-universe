name: Deploy OTA Update

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: skip
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Create bundle zip
        run: npx @capgo/cli@latest bundle zip --path dist

      - name: Move zip to public/www.zip
        run: |
          ZIP_FILE=$(ls -t app.xpensia.com_*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found matching app.xpensia.com_*.zip"
            exit 1
          fi
          echo "Found: $ZIP_FILE"
          mv "$ZIP_FILE" public/www.zip

      - name: Compute SHA256 and update manifest
        run: |
          SHA=$(sha256sum public/www.zip | awk '{print $1}')
          echo "SHA256: $SHA"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('public/manifest.json', 'utf8'));
            const parts = m.version.split('.').map(Number);
            parts[2] = (parts[2] || 0) + 1;
            m.version = parts.join('.');
            m.checksum = '${SHA}';
            fs.writeFileSync('public/manifest.json', JSON.stringify(m, null, 2));
            console.log('Updated manifest: version=' + m.version + ' checksum=' + m.checksum);
          "

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/manifest.json
          git commit -m "chore: bump OTA version [skip ci]" || echo "No changes to commit"
          git push
